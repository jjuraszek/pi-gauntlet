name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($tag) does not match package.json version $pkg"
            exit 1
          fi
      - name: Run tests
        run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public

  release-notes:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/edit the GitHub Release
    steps:
      - uses: actions/checkout@v5
      - name: Publish CHANGELOG section as release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk '/^## /{n++} n==1' CHANGELOG.md > notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" --notes-file notes.md \
            || gh release edit "$GITHUB_REF_NAME" --notes-file notes.md
